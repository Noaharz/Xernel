TIMEOUT=0
SERIAL=yes
INTERFACE_BRANDING=Xernel

:Xernel
    PROTOCOL=limine
    KERNEL_PATH=boot:///boot/xernel.elf
    # The first user program. The kernel reads this module at runtime and loads
    # it as an ELF into ring 3 (see kernel/src/elf.rs, kernel/src/user.rs).
    MODULE_PATH=boot:///boot/init.elf
    KASLR=no
